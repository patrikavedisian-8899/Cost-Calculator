<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monthly Spending</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow" id="storageStatus">Local browser storage</p>
          <h1>Monthly Spending</h1>
        </div>
        <div class="month-controls">
          <button id="signOut" class="secondary-button" type="button" hidden>Sign out</button>
          <button class="icon-button" id="previousMonth" aria-label="Previous month" title="Previous month">‹</button>
          <label class="month-picker">
            <span>Month</span>
            <input type="month" id="selectedMonth" />
          </label>
          <button class="icon-button" id="nextMonth" aria-label="Next month" title="Next month">›</button>
        </div>
      </section>

      <section class="auth-panel panel" id="authPanel" hidden>
        <div>
          <p class="eyebrow">Private cloud storage</p>
          <h2>Sign in to your spending app</h2>
        </div>
        <form id="authForm" class="auth-form">
          <label>
            <span>Email</span>
            <input type="email" id="authEmail" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <button class="primary-button" type="submit">Send code</button>
        </form>
        <form id="codeForm" class="auth-form code-form">
          <label>
            <span>Login code</span>
            <input type="text" id="authCode" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" required />
          </label>
          <button class="primary-button" type="submit">Sign in</button>
        </form>
        <p id="authMessage" class="auth-message"></p>
      </section>

      <div id="appContent">
      <section class="summary-grid" aria-label="Monthly summary">
        <article class="metric">
          <span>Total spent</span>
          <strong id="totalSpent">$0</strong>
          <small id="transactionCount">0 transactions</small>
        </article>
        <article class="metric">
          <span>Budget status</span>
          <strong id="budgetStatus">$0 left</strong>
          <small id="budgetLabel">Budget $2,500</small>
        </article>
        <article class="metric">
          <span>Daily average</span>
          <strong id="dailyAverage">$0</strong>
          <small id="projectedSpend">Projected $0</small>
        </article>
        <article class="metric">
          <span>Top category</span>
          <strong id="topCategory">None</strong>
          <small id="topCategoryShare">No spending yet</small>
        </article>
      </section>

      <section class="main-layout">
        <aside class="panel entry-panel" aria-label="Add spending">
          <div class="panel-heading">
            <h2>Add spending</h2>
            <button id="seedDemo" class="ghost-button" type="button">Demo data</button>
          </div>

          <form id="expenseForm">
            <label>
              <span>Date</span>
              <input type="date" id="expenseDate" required />
            </label>

            <label>
              <span>Amount</span>
              <input type="number" id="expenseAmount" min="0.01" step="0.01" placeholder="42.50" required />
            </label>

            <label>
              <span>Category</span>
              <select id="expenseCategory" required>
                <option>Groceries</option>
                <option>Dining</option>
                <option>Transport</option>
                <option>Home</option>
                <option>Health</option>
                <option>Shopping</option>
                <option>Subscriptions</option>
